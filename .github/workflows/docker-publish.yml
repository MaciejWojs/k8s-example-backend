name: Publish k8s-backend Docker image to GHCR

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: k8s-example-backend
  POSTGRES_USER: CIuser
  POSTGRES_PASSWORD: testpass
  POSTGRES_DB: CI

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            runnumber=${{ github.run_id }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  migrations:
    needs: push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    services:
     postgres:
       image: postgres:18.3-alpine3.23
       env:
         POSTGRES_USER: ${{ env.POSTGRES_USER }}
         POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
         POSTGRES_DB: ${{ env.POSTGRES_DB }}
       ports:
         - 5432:5432
       options: >-
         --health-cmd pg_isready
         --health-interval 10s
         --health-timeout 5s
         --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install Atlas
        uses: ariga/setup-atlas@v0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
      - name: apply current migrations
        run: |
          atlas migrate apply --url "postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}?sslmode=disable" --env local || true
      - name: generate new migration
        run: |
          atlas migrate diff --url "postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}?sslmode=disable" --env local || true
     
      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Push migrations artifact
        run: |
          oras login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

          oras push \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-migrations:${{ github.ref_name }} \
            atlas/:application/vnd.atlas.migration.layer.v1+sql
      - name: add to staging
        run: |
          git add atlas/
      - name: commit changes and push to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add new migration"
            git push origin HEAD:main
          fi
  template: 
    runs-on: ubuntu-latest
    needs: 
      - push
      - migrations
    steps:
      - name: status check
        run: echo "All jobs completed successfully"
        # this job is a placeholder for icrementing conteriners versions in IAC repository and creating a PR to merge the changes into main branch.