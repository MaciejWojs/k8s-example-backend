name: Publish k8s-backend Docker image to GHCR

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: k8s-example-backend
  POSTGRES_USER: CIuser
  POSTGRES_PASSWORD: testpass
  POSTGRES_DB: CI

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            runnumber=${{ github.run_id }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  migrations:
    needs: push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up environment variables
        shell: bash
        run: |
         TAG="${{ github.ref_name }}"
         VERSION="${TAG#v}"
 
         IMAGE_NAME_FINAL="${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-migrations:${VERSION}"
         IMAGE_NAME_FINAL=$(echo "$IMAGE_NAME_FINAL" | tr '[:upper:]' '[:lower:]')

         echo "IMAGE_NAME_FINAL=$IMAGE_NAME_FINAL"
         echo "IMAGE_NAME_FINAL=$IMAGE_NAME_FINAL" >> "$GITHUB_ENV"

      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Push migrations artifact
        run: |
          oras login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

          oras push \
            ghcr.io/$IMAGE_NAME_FINAL \
            atlas/:application/vnd.atlas.migration.layer.v1+sql
  template: 
    runs-on: ubuntu-latest
    needs: 
      - push
      - migrations
    steps:
      - name: status check
        run: echo "All jobs completed successfully"
        # this job is a placeholder for icrementing conteriners versions in IAC repository and creating a PR to merge the changes into main branch.